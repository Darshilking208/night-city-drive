<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Night City Drive</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Courier New',monospace}
#c{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
#hud{position:fixed;inset:0;pointer-events:none;z-index:10}
.corner{position:absolute;width:22px;height:22px;border-color:rgba(80,180,255,.4);border-style:solid}
.tl{top:14px;left:14px;border-width:1px 0 0 1px}
.tr{top:14px;right:14px;border-width:1px 1px 0 0}
.bl{bottom:14px;left:14px;border-width:0 0 1px 1px}
.br{bottom:14px;right:14px;border-width:0 1px 1px 0}
#topbar{position:absolute;top:14px;left:50%;transform:translateX(-50%);color:rgba(80,180,255,.45);font-size:10px;letter-spacing:4px}
#speedo{position:absolute;bottom:28px;right:28px;text-align:center;color:#7df;text-shadow:0 0 14px rgba(80,200,255,.9)}
#speedo .n{font-size:54px;font-weight:700;letter-spacing:-2px;line-height:1}
#speedo .u{font-size:11px;opacity:.6;letter-spacing:3px}
#gearbox{position:absolute;bottom:28px;left:28px;color:#7df;text-shadow:0 0 12px rgba(80,180,255,.8)}
#gearbox .g{font-size:34px;font-weight:700}
#gearbox .m{font-size:11px;opacity:.55;letter-spacing:2px;margin-top:2px}
#hint{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:rgba(160,210,255,.5);font-size:10px;letter-spacing:2px;text-align:center;line-height:2.2;transition:opacity 1.5s ease}
#hint.gone{opacity:0}
#scanlines{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.03) 3px,rgba(0,0,0,.03) 4px)}
#load{position:fixed;inset:0;background:#020510;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:100;transition:opacity .8s}
#load .logo{color:#7df;font-size:24px;font-weight:700;letter-spacing:6px}
#load .sub{color:rgba(80,180,255,.45);font-size:11px;letter-spacing:4px}
#load .bw{width:200px;height:2px;background:rgba(80,180,255,.15);border-radius:2px}
#load .bf{height:100%;background:#7df;border-radius:2px;width:0;transition:width .4s}
#load .lt{color:rgba(80,180,255,.5);font-size:10px;letter-spacing:3px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div id="scanlines"></div>
  <div class="corner tl"></div><div class="corner tr"></div>
  <div class="corner bl"></div><div class="corner br"></div>
  <div id="topbar">NIGHT CITY DRIVE &mdash; THREE.JS</div>
  <div id="speedo"><div class="n" id="spd">0</div><div class="u">KM / H</div></div>
  <div id="gearbox"><div class="g" id="gr">N</div><div class="m">NIGHT MODE</div></div>
  <div id="hint">W / &uarr; &nbsp;ACCELERATE &nbsp;&nbsp; S / &darr; &nbsp;BRAKE &nbsp;&nbsp; A D / ← → &nbsp;STEER &nbsp;&nbsp; C &nbsp;CAMERA &nbsp;&nbsp; ESC &nbsp;PAUSE</div>
</div>
<div id="load">
  <div class="logo">NIGHT CITY</div>
  <div class="sub">DRIVE</div>
  <div class="bw"><div class="bf" id="bf"></div></div>
  <div class="lt" id="lt">Initializing...</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
var _s=99;
function rng(){_s=(_s*1664525+1013904223)&0xffffffff;return(_s>>>0)/0xffffffff;}
var bfEl=document.getElementById('bf');
var ltEl=document.getElementById('lt');
function prog(p,msg){bfEl.style.width=p+'%';ltEl.textContent=msg;}
prog(5,'Building renderer...');
var canvas=document.getElementById('c');
var renderer=new THREE.WebGLRenderer({canvas:canvas,antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
window.addEventListener('resize',function(){
  renderer.setSize(innerWidth,innerHeight);
  cam.aspect=innerWidth/innerHeight;
  cam.updateProjectionMatrix();
});
var scene=new THREE.Scene();
scene.background=new THREE.Color(0x03050f);
scene.fog=new THREE.FogExp2(0x020410,0.010);
var cam=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,600);
cam.position.set(0,7,14);
prog(10,'Setting night lighting...');
scene.add(new THREE.AmbientLight(0x0d1830,3.2));
var moon=new THREE.DirectionalLight(0x4466aa,0.22);
moon.position.set(80,130,60);
moon.castShadow=true;
moon.shadow.mapSize.set(2048,2048);
moon.shadow.camera.near=1;moon.shadow.camera.far=500;
moon.shadow.camera.left=-160;moon.shadow.camera.right=160;
moon.shadow.camera.top=160;moon.shadow.camera.bottom=-160;
moon.shadow.bias=-0.0004;
scene.add(moon);
scene.add(moon.target); // FIX: target must be in scene
var mAsphalt=new THREE.MeshLambertMaterial({color:0x111318});
var mGrass=new THREE.MeshLambertMaterial({color:0x0a1808});
var mSidewalk=new THREE.MeshLambertMaterial({color:0x181820});
var mPole=new THREE.MeshLambertMaterial({color:0x303038});
var mDash=new THREE.MeshBasicMaterial({color:0xddcc22});
prog(16,'Paving roads...');
var RAXES=[-120,-60,0,60,120];
var RW=14,RSPAN=380,HBLK=23;
function mkPlane(w,l,mat,y,px,pz){
  var m=new THREE.Mesh(new THREE.PlaneGeometry(w,l),mat);
  m.rotation.x=-Math.PI/2;m.receiveShadow=true;
  m.position.set(px||0,y,pz||0);scene.add(m);return m;
}
mkPlane(900,900,mGrass,-0.01);
RAXES.forEach(function(z){
  mkPlane(RSPAN,RW,mAsphalt,0.01,0,z);
  mkPlane(RSPAN,2,mSidewalk,0.015,0,z-RW/2-1);
  mkPlane(RSPAN,2,mSidewalk,0.015,0,z+RW/2+1);
});
RAXES.forEach(function(x){
  mkPlane(RW,RSPAN,mAsphalt,0.01,x,0);
  mkPlane(2,RSPAN,mSidewalk,0.015,x-RW/2-1,0);
  mkPlane(2,RSPAN,mSidewalk,0.015,x+RW/2+1,0);
});
RAXES.forEach(function(x){RAXES.forEach(function(z){mkPlane(RW,RW,mAsphalt,0.02,x,z);});});
RAXES.forEach(function(z){
  for(var x=-185;x<185;x+=10){
    if(RAXES.some(function(rx){return Math.abs(x-rx)<RW/2;}))continue;
    mkPlane(5,0.22,mDash,0.025,x,z);
  }
});
RAXES.forEach(function(x){
  for(var z=-185;z<185;z+=10){
    if(RAXES.some(function(rz){return Math.abs(z-rz)<RW/2;}))continue;
    var d=new THREE.Mesh(new THREE.PlaneGeometry(0.22,5),mDash);
    d.rotation.x=-Math.PI/2;d.position.set(x,0.025,z);scene.add(d);
  }
});
prog(30,'Building the city...');
var BCENTERS=[-150,-90,-30,30,90,150];
var BPAL=[0x0e1825,0x131020,0x1a1015,0x0f1a10,0x1c1308,0x0d1520,0x201515,0x0a1520];
// Window glow palettes — warm yellow, cool white-blue, teal, soft amber
var WPAL=[0xffee99,0xffdd66,0xfff2cc,0xddf0ff,0xccf4ff,0xaaffee,0xffcc88,0xffe0aa];
// Neon sign colors
var NEON_COLS=[0xff2255,0x00ffcc,0xff6600,0x44aaff,0xff00ff,0x00ff88,0xffaa00,0xff3399];
var blinkMeshes=[];

function addNeonSign(px,py,pz,rotY,col){
  var sw=1.5+rng()*2.5,sh=0.35+rng()*0.25;
  var nMat=new THREE.MeshBasicMaterial({color:col});
  var sign=new THREE.Mesh(new THREE.PlaneGeometry(sw,sh),nMat);
  sign.position.set(px,py,pz);sign.rotation.y=rotY;scene.add(sign);
  // glow halo behind sign
  var hMat=new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:.13,side:THREE.BackSide});
  var halo=new THREE.Mesh(new THREE.SphereGeometry(sw*.55,7,5),hMat);
  halo.position.copy(sign.position);scene.add(halo);
  // colored point light
  var pl=new THREE.PointLight(col,.9,10,2.2);
  pl.position.copy(sign.position);scene.add(pl);
  // blink some signs
  if(rng()>.6){sign.userData.neonBlink=true;blinkMeshes.push(sign);halo.userData.neonBlink=true;blinkMeshes.push(halo);}
}

function addBuilding(cx,cz){
  // Cap width/depth so buildings never reach road edges (road edge = 23 units from block centre)
  // Max building half-width = 9, max center offset = 23 - 9 - 5(gap) = 9
  var bw=4+rng()*10, bd=4+rng()*10, bh=10+rng()*42;
  var maxOff=Math.max(0, 18-Math.max(bw,bd)/2);  // 5-unit gap from road edge
  var px=cx+(rng()-.5)*2*maxOff;
  var pz=cz+(rng()-.5)*2*maxOff;
  var bMat=new THREE.MeshLambertMaterial({color:BPAL[0|rng()*BPAL.length]});
  var body=new THREE.Mesh(new THREE.BoxGeometry(bw,bh,bd),bMat);
  body.position.set(px,bh/2,pz);body.castShadow=body.receiveShadow=true;scene.add(body);

  // Per-building warm fill PointLight — makes windows feel like they illuminate the facade
  var fillCol=rng()>.5?0xffcc66:0x88bbff;
  var fillPL=new THREE.PointLight(fillCol,.45,bw*2.2+bh*.18,2.0);
  fillPL.position.set(px,bh*.55,pz);scene.add(fillPL);

  // Rooftop color wash on tall buildings
  if(bh>25){
    var roofCol=NEON_COLS[0|rng()*NEON_COLS.length];
    var roofPL=new THREE.PointLight(roofCol,.7,16,2.0);
    roofPL.position.set(px,bh+1.2,pz);scene.add(roofPL);
    // colored roof ring (glowing disc)
    var ringMat=new THREE.MeshBasicMaterial({color:roofCol,transparent:true,opacity:.35,side:THREE.DoubleSide});
    var ring=new THREE.Mesh(new THREE.RingGeometry(bw*.3,bw*.48,16),ringMat);
    ring.rotation.x=-Math.PI/2;ring.position.set(px,bh+.08,pz);scene.add(ring);
  }

  // Antenna + blink light
  if(bh>22&&rng()>.45){
    var ant=new THREE.Mesh(new THREE.CylinderGeometry(.07,.07,5,5),new THREE.MeshLambertMaterial({color:0x222228}));
    ant.position.set(px+(rng()-.5)*bw*.35,bh+2.5,pz+(rng()-.5)*bd*.35);scene.add(ant);
    var blk=new THREE.Mesh(new THREE.SphereGeometry(.13,5,4),new THREE.MeshBasicMaterial({color:0xff1100}));
    blk.position.set(ant.position.x,bh+5.1,ant.position.z);blk.userData.blink=true;blinkMeshes.push(blk);scene.add(blk);
  }

  // Neon signs on street-level face (buildings >12 tall)
  if(bh>12&&rng()>.42){
    var nCol=NEON_COLS[0|rng()*NEON_COLS.length];
    var face=rng()>.5?1:-1;
    var ny=2.2+rng()*Math.min(bh-4,6);
    // pick a random face
    if(rng()>.5) addNeonSign(px, ny, pz+face*(bd/2+.05), face>0?0:Math.PI, nCol);
    else         addNeonSign(px+face*(bw/2+.05), ny, pz, face>0?-Math.PI/2:Math.PI/2, nCol);
  }
  // Second sign on tall buildings
  if(bh>28&&rng()>.55){
    var nCol2=NEON_COLS[0|rng()*NEON_COLS.length];
    var ny2=bh*.55+rng()*bh*.2;
    addNeonSign(px+(rng()-.5)*bw*.3, ny2, pz+bd/2+.05, 0, nCol2);
  }

  // Windows — more lit, brighter material
  var wCol=WPAL[0|rng()*WPAL.length];
  var wMat=new THREE.MeshBasicMaterial({color:wCol});
  var rows=Math.max(1,0|bh/3.8),rStep=(bh-2)/Math.max(rows-1,1);
  function winFace(fW,rotY,offX,offZ){
    var cols=Math.max(1,0|fW/2.8),cStep=(fW-2)/Math.max(cols-1,1);
    for(var r=0;r<rows;r++){for(var c=0;c<cols;c++){
      if(rng()>.72)continue; // more windows lit (was .55)
      // vary individual window brightness
      var wc=new THREE.MeshBasicMaterial({color:rng()>.15?wCol:0xffffff});
      var w=new THREE.Mesh(new THREE.PlaneGeometry(.65,.80),wc);
      var wl=-fW/2+1+c*cStep;
      w.position.set(px+offX+(rotY?0:wl),1.5+r*rStep,pz+offZ+(rotY?wl:0));
      w.rotation.y=rotY;scene.add(w);
    }}
  }
  winFace(bw,0,0,bd/2+.02);winFace(bw,Math.PI,0,-bd/2-.02);
  winFace(bd,Math.PI/2,bw/2+.02,0);winFace(bd,-Math.PI/2,-bw/2-.02,0);
}
BCENTERS.forEach(function(bx){BCENTERS.forEach(function(bz){
  for(var i=0,n=1+(0|rng()*3);i<n;i++)addBuilding(bx,bz);
});});

// ── Intersection glow pads (colored light pools at crossroads) ──
var intColors=[0x0033ff,0xff2200,0x00cc66,0xcc8800];
RAXES.forEach(function(rx,ri){RAXES.forEach(function(rz,zi){
  if(rng()>.55)return;
  var iCol=intColors[(ri+zi)%intColors.length];
  var iPL=new THREE.PointLight(iCol,.35,18,2.2);
  iPL.position.set(rx,.5,rz);scene.add(iPL);
});});
prog(50,'Planting trees...');
var mTrunk=new THREE.MeshLambertMaterial({color:0x2a1508});
var mTrunk2=new THREE.MeshLambertMaterial({color:0x1e1005});
var mLeaves=[
  new THREE.MeshLambertMaterial({color:0x0a2008}),
  new THREE.MeshLambertMaterial({color:0x0d2a0a}),
  new THREE.MeshLambertMaterial({color:0x091c07}),
  new THREE.MeshLambertMaterial({color:0x112d0d}),
];
function addTree(x,z,scale){
  scale=scale||1;
  var h=(2.2+rng()*2.2)*scale;
  var jx=x+(rng()-.5)*.5, jz=z+(rng()-.5)*.5;
  // trunk
  var t=new THREE.Mesh(new THREE.CylinderGeometry(.13*scale,.24*scale,h,7),rng()>.5?mTrunk:mTrunk2);
  t.position.set(jx,h/2,jz);t.castShadow=true;scene.add(t);
  // foliage — 1 or 2 layered spheres for bigger trees
  var lr=(0.9+rng()*.9)*scale;
  var lm=mLeaves[0|rng()*mLeaves.length];
  var l=new THREE.Mesh(new THREE.SphereGeometry(lr,8,6),lm);
  l.position.set(jx,h+lr*.45,jz);l.castShadow=true;scene.add(l);
  if(scale>0.9&&rng()>.5){
    var lr2=lr*.65;
    var l2=new THREE.Mesh(new THREE.SphereGeometry(lr2,7,5),mLeaves[0|rng()*mLeaves.length]);
    l2.position.set(jx+(rng()-.5)*lr*.6,h+lr*.85+lr2*.3,jz+(rng()-.5)*lr*.6);
    l2.castShadow=true;scene.add(l2);
  }
}
var treeSeen={};
function tryTree(x,z,scale){
  // Must not be on any road
  var onX=RAXES.some(function(rx){return Math.abs(x-rx)<=RW/2+1;});
  var onZ=RAXES.some(function(rz){return Math.abs(z-rz)<=RW/2+1;});
  if(onX&&onZ)return; // intersection
  if(onX||onZ){ // on a road strip — only allow sidewalk trees
    if(onX&&Math.abs(x-RAXES.reduce(function(a,b){return Math.abs(x-a)<Math.abs(x-b)?a:b;}))<RW/2)return;
    if(onZ&&Math.abs(z-RAXES.reduce(function(a,b){return Math.abs(z-a)<Math.abs(z-b)?a:b;}))<RW/2)return;
  }
  var k=(0|x*2)+','+(0|z*2);
  if(treeSeen[k])return;
  treeSeen[k]=1;
  addTree(x,z,scale||1);
}

// Roadside trees — denser, every 14 units
RAXES.forEach(function(rp){
  var ts=RW/2+3.8;
  for(var t=-175;t<=175;t+=14){
    tryTree(t, rp+ts, 0.9+rng()*.4);
    tryTree(t, rp-ts, 0.9+rng()*.4);
    tryTree(rp+ts, t, 0.9+rng()*.4);
    tryTree(rp-ts, t, 0.9+rng()*.4);
  }
});

// Block-interior trees — scattered in open areas between buildings
var BCENTERS_ARR=[-150,-90,-30,30,90,150];
BCENTERS_ARR.forEach(function(bx){
  BCENTERS_ARR.forEach(function(bz){
    var n=3+Math.floor(rng()*4);
    for(var i=0;i<n;i++){
      var tx=bx+(rng()-.5)*36;
      var tz=bz+(rng()-.5)*36;
      tryTree(tx,tz,0.7+rng()*.6);
    }
  });
});
prog(65,'Installing street lights...');
var mGlobe=new THREE.MeshBasicMaterial({color:0xffee88});
var mHalo=new THREE.MeshBasicMaterial({color:0xffdd44,transparent:true,opacity:.05,side:THREE.BackSide});
var lightSeen={};
function addStreetLight(x,z,side){
  var k=(0|x)+','+(0|z);if(lightSeen[k])return;lightSeen[k]=1;
  var pole=new THREE.Mesh(new THREE.CylinderGeometry(.08,.12,7,6),mPole);
  pole.position.set(x,3.5,z);scene.add(pole);
  var arm=new THREE.Mesh(new THREE.CylinderGeometry(.05,.05,2,5),mPole);
  arm.rotation.z=Math.PI/2;arm.position.set(x+side,7.1,z);scene.add(arm);
  var globe=new THREE.Mesh(new THREE.SphereGeometry(.25,8,6),mGlobe);
  globe.position.set(x+side*2,7,z);scene.add(globe);
  var halo=new THREE.Mesh(new THREE.SphereGeometry(1,8,6),mHalo);
  halo.position.copy(globe.position);scene.add(halo);
  var pl=new THREE.PointLight(0xffcc44,1.3,34,1.6);
  pl.position.copy(globe.position);scene.add(pl);
}
RAXES.forEach(function(rp){
  var ls=RW/2+2.2;
  for(var t=-160;t<=160;t+=30){
    addStreetLight(t,rp+ls,1);addStreetLight(t,rp-ls,-1);
    addStreetLight(rp+ls,t,1);addStreetLight(rp-ls,t,-1);
  }
});
prog(73,'Scattering stars...');
(function(){
  var n=1400,pos=new Float32Array(n*3);
  for(var i=0;i<n;i++){pos[i*3]=(rng()-.5)*900;pos[i*3+1]=70+rng()*280;pos[i*3+2]=(rng()-.5)*900;}
  var g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.BufferAttribute(pos,3));
  scene.add(new THREE.Points(g,new THREE.PointsMaterial({color:0xffffff,size:.55})));
})();
var moonDisc=new THREE.Mesh(new THREE.SphereGeometry(9,12,10),new THREE.MeshBasicMaterial({color:0xddeeff}));
moonDisc.position.set(130,190,-220);scene.add(moonDisc);
prog(82,'Assembling car...');
var car=new THREE.Group();scene.add(car);

// ── Materials ──────────────────────────────────────────────
var mBody   =new THREE.MeshLambertMaterial({color:0xcc1a1a});   // main paint
var mBody2  =new THREE.MeshLambertMaterial({color:0xaa1212});   // darker panels
var mRoof   =new THREE.MeshLambertMaterial({color:0x880e0e});   // roof
var mBump   =new THREE.MeshLambertMaterial({color:0x1c1c24});   // bumpers / trim
var mSkirt  =new THREE.MeshLambertMaterial({color:0x141418});   // side skirts
var mGlass  =new THREE.MeshLambertMaterial({color:0x0e1a28,transparent:true,opacity:.65});
var mGlassDk=new THREE.MeshLambertMaterial({color:0x08101a,transparent:true,opacity:.75});
var mChrome =new THREE.MeshLambertMaterial({color:0x99aabb});   // chrome trim
var mUnderbody=new THREE.MeshLambertMaterial({color:0x0a0a0e});
var mTire   =new THREE.MeshLambertMaterial({color:0x0d0d0d});
var mRim    =new THREE.MeshLambertMaterial({color:0x778888});

function part(w,h,d,mat,px,py,pz,rx,ry,rz){
  var m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
  m.position.set(px,py,pz);
  if(rx)m.rotation.x=rx; if(ry)m.rotation.y=ry; if(rz)m.rotation.z=rz;
  m.castShadow=true; m.receiveShadow=true;
  car.add(m); return m;
}

// ── Underbody flat plate ───────────────────────────────────
part(2.0,.08,4.6,mUnderbody,0,.18,0);

// ── Lower body sill (wide flat band) ──────────────────────
part(2.2,.38,4.5,mBody2,0,.42,0);           // main sill
// Side body bulge (wider at wheel arches)
part(2.28,.28,.80,mBody,0,.55, 1.38);        // front arch bulge
part(2.28,.28,.80,mBody,0,.55,-1.38);        // rear arch bulge

// ── Main body ─────────────────────────────────────────────
part(2.10,.55,4.40,mBody,0,.72,0);           // centre body

// ── Side skirts (very low, long) ──────────────────────────
part(2.32,.12,4.20,mSkirt,0,.26,0);
// Skirt accent strip
part(2.34,.04,4.10,mChrome,0,.19,0);

// ── Hood (sloped — 3 angled sections) ─────────────────────
// Front low section
part(2.08,.07,0.80,mBody, 0,.82, 1.80);
// Mid rising section (angled up)
var hoodMid=new THREE.Mesh(new THREE.BoxGeometry(2.08,.13,1.0),mBody);
hoodMid.position.set(0,.90,1.10); hoodMid.rotation.x=-.10;
hoodMid.castShadow=true; car.add(hoodMid);
// Hood scoop / power bulge (centre ridge)
part(.40,.06,1.60,mBody2,0,.98,1.30);
// Front lip spoiler
part(1.90,.10,.28,mBump,0,.30,2.34);
part(1.90,.06,.12,mChrome,0,.36,2.28);

// ── Windshield pillar + roof + rear ───────────────────────
// A-pillar left/right
var aPillarGeo=new THREE.BoxGeometry(.09,.55,.06);
[-0.72,0.72].forEach(function(px){
  var ap=new THREE.Mesh(aPillarGeo,mRoof);
  ap.position.set(px,1.30,.95); ap.rotation.x=-.38; car.add(ap);
});
// Windshield (large raked pane)
var ws=new THREE.Mesh(new THREE.BoxGeometry(1.50,.62,.06),mGlass);
ws.position.set(0,1.24,.92); ws.rotation.x=-.42; car.add(ws);
// Windshield frame

// ── Web Audio ────────────────────────────────────────────
var audioCtx=null;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
var musicNodes=[];
function startMusic(){
  var ctx=getAudio();
  [55,82,110,165].forEach(function(freq,i){
    var osc=ctx.createOscillator(),gain=ctx.createGain();
    osc.type=i%2?'triangle':'sine'; osc.frequency.value=freq;
    gain.gain.value=0.038+i*.008;
    var lfo=ctx.createOscillator(),lg=ctx.createGain();
    lfo.frequency.value=0.15+i*.06; lg.gain.value=0.012;
    lfo.connect(lg);lg.connect(gain.gain);lfo.start();
    osc.connect(gain);gain.connect(ctx.destination);osc.start();
    musicNodes.push(osc,lfo,gain);
  });
}
function stopMusic(){musicNodes.forEach(function(n){try{n.stop();}catch(e){}});musicNodes=[];}
var engineOsc=null,engineGain=null;
function startEngine(){
  if(engineOsc)return;
  var ctx=getAudio();
  engineOsc=ctx.createOscillator(); engineGain=ctx.createGain();
  engineOsc.type='sawtooth'; engineOsc.frequency.value=60; engineGain.gain.value=0;
  var f=ctx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=380;
  engineOsc.connect(f);f.connect(engineGain);engineGain.connect(ctx.destination);
  engineOsc.start();
}
function updateEngine(spd){
  if(!engineOsc)return;
  var n=Math.abs(spd)/CFG.maxFwd;
  engineOsc.frequency.value=55+n*230;
  engineGain.gain.value=(settings.sfx&&n>.01)?0.055:0;
}

function togglePause(){
  paused=!paused;
  if(paused)buildMenu();
  pauseEl.style.display=paused?'flex':'none';
  if(!paused&&!engineOsc)startEngine();
}

function resetCar(){
  state.x=0;state.z=0;state.speed=0;state.steer=0;state.yaw=0;
  car.position.set(0,0,0);car.rotation.y=0;
  camT.set(0,7,14);camL.set(0,1.2,0);
}
var spdEl=document.getElementById('spd');
var grEl=document.getElementById('gr');
var hintEl=document.getElementById('hint');
var hintTmr=0;
function update(dt,elapsed){
  var gF=fwd()||touch.fwd,gB=bwd()||touch.bwd,gL=lft()||touch.lft,gR=rgt()||touch.rgt;
  if(gF)state.speed=Math.min(CFG.maxFwd,state.speed+CFG.accel);
  if(gB)state.speed=Math.max(-CFG.maxRev,state.speed-CFG.brake);
  state.speed*=CFG.fric;
  if(Math.abs(state.speed)<.0004)state.speed=0;
  if(gL)state.steer=Math.min(CFG.steerMax,state.steer+CFG.steerAcc);
  if(gR)state.steer=Math.max(-CFG.steerMax,state.steer-CFG.steerAcc);
  if(!gL&&!gR)state.steer*=CFG.steerRet;
  var spd01=Math.min(Math.abs(state.speed)/CFG.maxFwd,1);
  if(Math.abs(state.speed)>.002)state.yaw+=state.steer*Math.sign(state.speed)*spd01*1.5;
  state.x-=Math.sin(state.yaw)*state.speed;
  state.z-=Math.cos(state.yaw)*state.speed;
  car.position.set(state.x,0,state.z);
  car.rotation.y=state.yaw;
  var rollDelta=state.speed*9;
  wheels.forEach(function(w){
    // spin the spinGroup around its local X axis (correct roll direction)
    w.spin.rotation.x+=rollDelta;
    // steer only front wheels via the wg Y rotation
    if(w.isFront)w.wg.rotation.y=state.steer*10;
  });
  // Brake + reverse lights
  var braking=gB&&state.speed>.01;
  brakeMat.opacity=braking?.6:0;
  rearLight.intensity=braking?2.2:.25;
  tailHaloMat.opacity=braking?.28:.09;
  // Update headlight SpotLight targets (must be world-space, ahead of car)
  hlTargets.forEach(function(item){
    var cos=Math.cos(state.yaw),sin=Math.sin(state.yaw);
    item.tgt.position.set(
      state.x - sin*28 + item.ox*cos,
      0,
      state.z - cos*28 - item.ox*sin
    );
  });
  // ── CAMERA MODES ─────────────────────────────────────────
  var sin=Math.sin(state.yaw), cos=Math.cos(state.yaw);

  if(camMode===0){
    // ── CHASE: classic behind-and-above follow cam ──────────
    var dist=11+Math.abs(state.speed)*8, ht=5.8+Math.abs(state.speed)*5;
    var tx=state.x+sin*dist, tz=state.z+cos*dist;
    camT.x+=(tx-camT.x)*.08; camT.y+=(ht-camT.y)*.08; camT.z+=(tz-camT.z)*.08;
    cam.position.copy(camT);
    var lx=state.x-sin*3, lz=state.z-cos*3;
    camL.x+=(lx-camL.x)*.12; camL.z+=(lz-camL.z)*.12; camL.y=1.2;
    cam.lookAt(camL);

  } else if(camMode===1){
    // ── HOOD: low front-facing cam on the bonnet ───────────
    // Offset: sit just above the hood, looking forward
    var hoodOffX= -sin*1.8;  // 1.8 units ahead of centre
    var hoodOffZ= -cos*1.8;
    var idealX=state.x+hoodOffX, idealY=1.05, idealZ=state.z+hoodOffZ;
    camT.x+=(idealX-camT.x)*.25; camT.y+=(idealY-camT.y)*.25; camT.z+=(idealZ-camT.z)*.25;
    cam.position.copy(camT);
    // Look toward a point ~18 units ahead
    var fwX=state.x-sin*18, fwZ=state.z-cos*18;
    camL.x+=(fwX-camL.x)*.25; camL.y=0.9; camL.z+=(fwZ-camL.z)*.25;
    cam.lookAt(camL);

  } else if(camMode===2){
    // ── COCKPIT: inside the cabin, driver's eye view ───────
    // Sit at driver head height, slightly right of centre, looking forward
    var driverX=state.x - sin*0.1 + Math.cos(state.yaw)*0.28;  // 0.28 right of centre
    var driverY=1.32;
    var driverZ=state.z - cos*0.1 - Math.sin(state.yaw)*0.28;
    camT.x+=(driverX-camT.x)*.30; camT.y+=(driverY-camT.y)*.30; camT.z+=(driverZ-camT.z)*.30;
    cam.position.copy(camT);
    // Look 20 units ahead + account for steering (small yaw offset)
    var steerLook=state.steer*4;
    var fwdX=state.x - sin*20 + cos*steerLook;
    var fwdZ=state.z - cos*20 - sin*steerLook;
    camL.x+=(fwdX-camL.x)*.20; camL.y=1.18; camL.z+=(fwdZ-camL.z)*.20;
    cam.lookAt(camL);

  } else {
    // ── ORBIT: slow cinematic circle around the car ─────────
    orbitAngle+=0.008;  // auto-rotate
    var ox=state.x+Math.sin(orbitAngle)*orbitRadius;
    var oz=state.z+Math.cos(orbitAngle)*orbitRadius;
    camT.x+=(ox-camT.x)*.05; camT.y+=(orbitHeight-camT.y)*.05; camT.z+=(oz-camT.z)*.05;
    cam.position.copy(camT);
    // Always look at the car
    camL.x+=(state.x-camL.x)*.08; camL.y=0.9; camL.z+=(state.z-camL.z)*.08;
    cam.lookAt(camL);
  }
  // moon shadow tracking
  moon.position.set(state.x+80,130,state.z+60);
  moon.target.position.set(state.x,0,state.z);
  moon.target.updateMatrixWorld();
  // HUD
  spdEl.textContent=0|Math.abs(state.speed)*420;
  grEl.textContent=state.speed>.005?'D':state.speed<-.005?'R':'N';
  if(Math.abs(state.speed)>.01)hintTmr+=dt;
  if(hintTmr>4)hintEl.classList.add('gone');
  blinkMeshes.forEach(function(m,i){
    if(m.userData.neonBlink){
      var fl=Math.sin(elapsed*3.1+i*2.3)*Math.sin(elapsed*7.7+i*1.1);
      m.visible=(fl>-0.3);
      if(m.material&&m.material.transparent)m.material.opacity=.08+Math.max(0,fl)*.22;
    }else{
      m.visible=Math.sin(elapsed*1.9+i*1.1)>.3;
    }
  });
}
prog(100,'Ready!');
setTimeout(function(){
  var loadEl=document.getElementById('load');
  loadEl.style.opacity='0';
  setTimeout(function(){loadEl.remove();},900);
  var clock=new THREE.Clock();
  (function loop(){
    requestAnimationFrame(loop);
    var dt=clock.getDelta();
    if(!paused){
      update(dt,clock.getElapsedTime());
      updateEngine(state.speed);
    }
    if(settings.fps)tickFps();
    renderer.render(scene,cam);
  })();
},500);
</script>
